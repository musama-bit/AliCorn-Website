<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Alicorn AI</title>
    <meta name="description" content="Get in touch with the Alicorn AI team. We'd love to hear from you.">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #FFFFFF;
            background: linear-gradient(135deg, #0B1A33 0%, #13294B 40%, #1D3A6B 70%, #254B85 100%);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        :root {
            --carolina-blue: #4B9CD3;
            --carolina-blue-light: #7DB8E0;
            --navy: #13294B;
            --navy-light: #1D3A6B;
            --white: #FFFFFF;
        }

        h1, h2, h3 { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 700; line-height: 1.15; }
        h1 { font-size: clamp(2rem, 4vw, 2.8rem); letter-spacing: -0.02em; }

        /* Ambient orbs */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(75, 156, 211, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: orbFloat 10s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -15%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(75, 156, 211, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: orbFloat 8s ease-in-out infinite reverse;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -15px) scale(1.03); }
            66% { transform: translate(-10px, 10px) scale(0.98); }
        }

        /* Nav */
        .nav {
            padding: 16px 0;
            position: relative;
            z-index: 10;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--white);
        }
        .nav-logo-mark { width: 40px; height: 40px; }
        .nav-logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--white);
        }
        .nav-back {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-back:hover { color: var(--white); }

        /* Page layout */
        .page {
            max-width: 640px;
            margin: 0 auto;
            padding: 40px 24px 80px;
            position: relative;
            z-index: 1;
        }
        .page-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .page-header .overline {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--carolina-blue-light);
            display: block;
            margin-bottom: 12px;
        }
        .page-header h1 { margin-bottom: 12px; }
        .page-header p {
            color: rgba(255,255,255,0.6);
            font-size: 1.05rem;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Glass form card */
        .form-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 44px 40px;
            backdrop-filter: blur(40px) saturate(1.4);
            -webkit-backdrop-filter: blur(40px) saturate(1.4);
            box-shadow:
                0 1px 0 rgba(255,255,255,0.06) inset,
                0 -1px 0 rgba(0,0,0,0.1) inset,
                0 16px 48px rgba(0,0,0,0.2),
                0 4px 12px rgba(0,0,0,0.1);
        }

        /* Form fields */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.02em;
        }
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px) saturate(1.4);
            color: white;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset;
        }
        .form-input::placeholder,
        .form-textarea::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .form-input:focus,
        .form-textarea:focus {
            border-color: rgba(75, 156, 211, 0.5);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 0 0 3px rgba(75, 156, 211, 0.12);
        }
        .form-textarea {
            min-height: 140px;
            resize: vertical;
            line-height: 1.6;
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 16px 32px;
            border-radius: 16px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, rgba(75, 156, 211, 0.85), rgba(58, 124, 181, 0.9));
            color: var(--white);
            box-shadow: 0 4px 16px rgba(75, 156, 211, 0.3), 0 1px 0 rgba(255,255,255,0.15) inset;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin-top: 8px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(75, 156, 211, 0.45), 0 1px 0 rgba(255,255,255,0.2) inset;
            background: linear-gradient(135deg, rgba(75, 156, 211, 0.95), rgba(58, 124, 181, 1));
        }
        .btn-submit.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        /* Status messages */
        .form-status {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            min-height: 24px;
        }
        .form-status.success {
            color: #34D399;
            font-weight: 500;
        }
        .form-status.error {
            color: #F87171;
        }

        /* Success state */
        .success-state {
            text-align: center;
            padding: 40px 20px;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .success-icon svg { width: 28px; height: 28px; color: #34D399; }
        .success-state h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        .success-state p {
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
        }
        .hidden { display: none; }

        /* Footer */
        .footer {
            position: relative;
            z-index: 1;
            padding: 32px 0;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
        }
        .footer a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer a:hover { color: var(--carolina-blue-light); }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .form-card { padding: 32px 24px; }
            .page { padding: 24px 16px 60px; }
        }
    </style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-logo">
            <img src="/assets/logo-mark-light.png" alt="Alicorn AI" style="width:44px;height:44px;object-fit:contain;">
            <span class="nav-logo-text">Alicorn AI</span>
        </a>
        <a href="/" class="nav-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Home
        </a>
    </div>
</nav>

<!-- Page content -->
<div class="page">
    <div class="page-header">
        <span class="overline">Get in Touch</span>
        <h1>We'd love to hear from you.</h1>
        <p>Have a question, partnership idea, or just want to say hello? Drop us a note and we'll get back to you.</p>
    </div>

    <div class="form-card">
        <form id="contactForm">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="firstName">First Name</label>
                    <input type="text" id="firstName" class="form-input" placeholder="Jane" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="lastName">Last Name</label>
                    <input type="text" id="lastName" class="form-input" placeholder="Smith" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="jane@company.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="note">Your Message</label>
                <textarea id="note" class="form-textarea" placeholder="Tell us what's on your mind..." required></textarea>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Send Message</button>
        </form>

        <div class="success-state hidden" id="successState">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <h3>Message sent.</h3>
            <p>Thanks for reaching out. We'll get back to you soon.</p>
        </div>

        <div class="form-status" id="formStatus"></div>
    </div>
</div>

<!-- Footer -->
<footer class="footer">
    <p>&copy; 2026 Alicorn AI. All rights reserved. &nbsp;|&nbsp; <a href="/">Home</a></p>
</footer>

<script>
    const form = document.getElementById('contactForm');
    const submitBtn = document.getElementById('submitBtn');
    const formStatus = document.getElementById('formStatus');
    const successState = document.getElementById('successState');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim();
        const note = document.getElementById('note').value.trim();

        if (!firstName || !lastName || !email || !note) return;

        submitBtn.classList.add('loading');
        submitBtn.textContent = 'Sending...';
        formStatus.className = 'form-status';
        formStatus.textContent = '';

        try {
            const response = await fetch('/api/contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ firstName, lastName, email, note })
            });

            if (response.ok) {
                form.classList.add('hidden');
                successState.classList.remove('hidden');
            } else {
                throw new Error('Submission failed');
            }
        } catch (err) {
            submitBtn.classList.remove('loading');
            submitBtn.textContent = 'Send Message';
            formStatus.className = 'form-status error';
            formStatus.textContent = 'Something went wrong. Please try again or email hello@alicornai.com.';
        }
    });
</script>

</body>
</html>
